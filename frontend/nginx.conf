server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 强制全站 UTF-8 编码，解决中文乱码
    charset utf-8;
    charset_types text/html text/css application/json application/javascript text/xml application/xml text/javascript;

    # Vue Router history 模式支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存，确保图标/图片/CSS/JS 正常加载
    location ~* \.(png|jpg|jpeg|gif|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        charset off;
    }
}
