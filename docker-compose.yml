services:

  # ──────────────────────────────── MySQL ────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-moxiang_forum}
      MYSQL_USER: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      # Auto-initialise schema & seed data on first run
      - ./backend/moxiang-web/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      # Use MYSQL_PWD to avoid exposing the password in the process list
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -u root"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──────────────────────────────── Redis ────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: |
        sh -c 'set -e
        if [ -n "$${REDIS_PASSWORD}" ]; then
          mkdir -p /usr/local/etc/redis
          cat >/usr/local/etc/redis/pass.conf <<EOF
        requirepass $${REDIS_PASSWORD}
        EOF
          chmod 600 /usr/local/etc/redis/pass.conf
          exec redis-server /usr/local/etc/redis/pass.conf
        else
          exec redis-server
        fi'
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$${REDIS_PASSWORD}" ]; then
            export REDISCLI_AUTH="$${REDIS_PASSWORD}"
          fi
          redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────── Backend ───────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Point datasource at the mysql container
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-moxiang_forum}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      # Point Redis at the redis container
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # JWT secret – overrides jwt.secret in application.yml via Spring relaxed binding
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"

  # ─────────────────────────────── Frontend ──────────────────────────────
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
